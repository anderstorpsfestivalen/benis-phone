# Simonstorp — full config, with the beer flow (press 4) built from generic
# declarative primitives instead of the bespoke `interactive = { dst = "beer" }`
# handler. Everything else mirrors simonstorp.toml.
#
# The beer flow: listmenu (dynamic menu from /api/members) stores the chosen
# member in .Vars.member, then a SEQUENTIAL chain of `auto` nodes linked by
# `then` reads the BAC, rolls a beer, and lands on the accept/veto menu — no
# intermediate keypress. auto (run-on-entry) + then (auto-advance) ARE the
# sequence.

[general]
entrypoint = "main"
default_tts_provider = "elevenlabs"
default_tts_voice = "IKne3meq5aSn9XLyUdCD"
default_tts_lang = "sv-SE"
default_tts_engine = "eleven_multilingual_v2"

[sip]
server = "sip.anderstorpsfestivalen.se:5060"
extension = "3005"
username = "3005"
transport = "udp"
local_port = 5060
max_concurrent_calls = 10
record_path = "files/recording"
expiry_seconds = 300
external_ip = "45.154.28.76"
# Password stored in creds/creds.json under "SIP.Password"

############################
# MAIN
############################
[[fn]]
name = "main"
actions = [
    { num = 1, srv = { dst = "weather", args = { latitude = "57.2684", longitude = "13.8358", timezone = "Europe/Stockholm", name = "Simonstorp" }, tmpl = "{{.Current.Condition}}, {{.Current.TempC}} degrees. Today's high {{.Today.HighC}}, low {{.Today.LowC}}. {{if .Today.RainSoon}}Rain expected around {{.Today.RainSoon}}.{{end}}" }, pmsg = { tts = { msg = "The current forecast for Simonstorp is: " } } },
    { num = 3, dst = "directory" },
    # Beer: dynamic member menu → sequential BAC → roll → decide.
    { num = 4, name = "Öl", listmenu = { url = "https://beer.anderstorpsfestivalen.se/api/members", list = "sort_by(.id)", label = "{{.name}}", intro = "Vem vill du rulla för?", store = "member", dst = "beer_bac" } },
    { num = 5, srv = { dst = "traintimes", tmpl = """{{.K.InformationOwner}},
        {{index .K.ProductInformation 0}},
        {{.K.TypeOfTraffic}} nummer,
        {{.K.TechnicalTrainIdent}},
        Från {{.From.AdvertisedLocationName}},
        Till {{.To.AdvertisedLocationName}},
        avgår från spår: {{.K.TrackAtLocation}},
        klockan {{.Hour}} och {{.Minute}}""", args = { station = "Reftele" } } },
    { num = 6, dst = "livestream" },
    { num = 8, dst = "voicemail" },
    { num = 9, dispatcher = "customerservice" },
]
recording = { path = "random" }
prefix = { tts = { msg = """Välkommen till Simonstorp!
     Tryck 1 för väderrapporten i Simonstorp.
     Tryck 2 för temperaturen i Bastun.
     Tryck 3 för telefonbok.
     Tryck 4 för öl.
     Tryck 5 för tågtiderna i Reftele.
     Tryck 6 för livestream av köket.
     Tryck 8 för att lämna ett meddelande
     To speak with a customer representative, press 9 or wait on the line.""" } }

############################
# BEER (declarative flow: listmenu → sequential auto/then chain)
############################
# Step 1: read the chosen member's promille, then advance to the roll.
[[fn]]
name = "beer_bac"
actions = [
    { auto = true, name = "Läs BAC", genericjson = { url = "https://beer.anderstorpsfestivalen.se/api/public/bac", tmpl = """Din alkoholhalt är {{jq .Data (printf ".members[] | select(.userId == %v) | .promille" .Vars.member.id)}} promille.""" }, then = "beer_roll" },
]

# Step 2: roll a beer for the chosen member, store it, read it out, then
# advance to the decision menu.
[[fn]]
name = "beer_roll"
actions = [
    { auto = true, name = "Rulla", genericjson = { url = "https://beer.anderstorpsfestivalen.se/api/public/roll", method = "POST", body = """{"userId": {{.Vars.member.id}}}""", store = { roll = "." }, tmpl = "Du rullade {{.Data.productNameBold}}, {{.Data.alcoholPercent}} procent. Tryck 1 för att acceptera. Tryck 2 för att avvisa." }, then = "beer_decide" },
]

# Step 3: accept or veto the rolled turn captured in .Vars.roll.id.
[[fn]]
name = "beer_decide"
actions = [
    { num = 1, name = "Acceptera", genericjson = { url = "https://beer.anderstorpsfestivalen.se/api/public/roll/{{.Vars.roll.id}}/accept", method = "POST", body = "{}", tmpl = "Accepterad. Skål!" } },
    { num = 2, name = "Avvisa", genericjson = { url = "https://beer.anderstorpsfestivalen.se/api/public/roll/{{.Vars.roll.id}}/veto", method = "POST", body = "{}", tmpl = "Avvisad." } },
]

############################
# LIVESTREAM (livefeed action demo)
############################
[[fn]]
name = "livestream"
prefix = { tts = { msg = "Live audio. Press 1 for the default mic, press 0 to go back." } }
actions = [
    # Empty device string opens the system default capture device.
    # Pick a specific interface by substring, e.g. device = "Scarlett",
    # and a channel within it (0-indexed).
    { num = 1, livefeed = { device = "", channel = 0 } },
]

############################
# VOICEMAIL
############################
[[fn]]
name = "voicemail"
recording = { path = "voicemail" }
prefix = { tts = { msg = """Please leave a message after the beep: BEEP""" } }
actions = []

############################
# DIRECTORY (call control demo - transfer to other extensions)
############################
[[fn]]
name = "directory"
prefix = { tts = { msg = """Directory. Press one for sales, two for support,
    three for billing. Press zero to go back.""" } }
actions = [
    # Extension shorthand expands to "sip:<ext>@<def.SIP.Domain>".
    { num = 1, transfer = "201" },
    { num = 2, transfer = "202" },
    { num = 3, transfer = "203" },
]

############################
# QUEUE MODE
############################
[[queue]]
name = "customerservice"

minpos = 20
maxpos = 45

entrymsg = { tts = { msg = """Please wait while we try to connect you to one
    of our customer service representatives""" }, wait = true }
bgmusic = { src = "files/hold.mp3" }
currentpos = { msg = "Your current place in line is: {{.Position}}" }
end = { tts = { msg = "Technical error, please try again." } }

[[queue.prompt]]
prompt = { tts = { msg = """"We are currently experiencing high call volumes.
    Your call will be answered as soon as possible by one of our agents.""" } }
weight = 4

[[queue.prompt]]
prompt = { tts = { msg = """"Your call is very important to us,
    please stay on the line.""" } }
weight = 3

[[queue.prompt]]
prompt = { tts = { msg = """"You may find answers to your questions by visiting
        w w w dot anderstorpsfestivalen dot s e""" } }
weight = 1

[[queue.prompt]]
prompt = { tts = { msg = """"Your call is very important to us, please stay on the line
        until your call is no longer important to you.""" } }
weight = 1

[[queue.prompt]]
empty = true
weight = 3
