[general]
entrypoint = "main"
default_tts_voice = "IKne3meq5aSn9XLyUdCD"
default_tts_lang = "sv-SE"
default_tts_engine = "eleven_multilingual_v2"
default_tts_provider = "elevenlabs"

[sip]
server = "sip.anderstorpsfestivalen.se:5060"
extension = "3005"
username = "3005"
transport = "udp"
local_port = 5060
max_concurrent_calls = 10
record_path = "files/recording"
expiry_seconds = 300
external_ip = "45.154.28.76"

[[fn]]
name = "main"
recording = { path = "random" }
prefix = { tts = { msg = """Välkommen till Simonstorp!
     Tryck 1 för väderrapporten i Simonstorp.
     Tryck 2 för temperaturen i Bastun.
     Tryck 3 för telefonbok.
     Tryck 4 för öl.
     Tryck 5 för tågtiderna i Reftele.
     Tryck 6 för livestream av köket.
     Tryck 8 för att lämna ett meddelande
     To speak with a customer representative, press 9 or wait on the line.""" } }
actions = [
    { num = 1, name = "Väder", pmsg = { tts = { msg = "The current forecast for Simonstorp is: " } }, srv = { dst = "weather", tmpl = "{{.Current.Condition}}, {{.Current.TempC}} degrees. Today's high {{.Today.HighC}}, low {{.Today.LowC}}. {{if .Today.RainSoon}}Rain expected around {{.Today.RainSoon}}.{{end}}", args = { latitude = "57.2684", longitude = "13.8358", timezone = "Europe/Stockholm", name = "Simonstorp" } } },
    { num = 3, dst = "directory" },
    { num = 4, name = "Öl", script = { args = { base_url = "https://beer.anderstorpsfestivalen.se" }, code = '''
// Öl-menyn: välj medlem, läs promille, rulla en öl, acceptera eller avvisa.
var base = (args.base_url || "https://beer.anderstorpsfestivalen.se").replace(/\/+$/, "");

var members = http.get(base + "/api/members").json;
if (!members || members.length === 0) {
  speak("Det finns inga medlemmar att välja bland.");
  return;
}
members.sort(function (a, b) { return a.id - b.id; });
if (members.length > 9) { members = members.slice(0, 9); }

var menu = "Välkommen till ölmenyn. ";
for (var i = 0; i < members.length; i++) {
  menu += "Tryck " + (i + 1) + " för " + members[i].name + ". ";
}
menu += "Tryck 0 för att gå tillbaka.";
speak(menu);

var idx = parseInt(readKey(), 10) - 1;
if (isNaN(idx) || idx < 0 || idx >= members.length) { return; }
var chosen = members[idx];

var bac = http.get(base + "/api/public/bac").json;
var promille = null;
if (bac && bac.members) {
  var found = bac.members.find(function (m) { return m.userId === chosen.id; });
  if (found) { promille = found.promille; }
}
var offer = promille !== null
  ? chosen.name + ", din alkoholhalt är " + sv(promille) + " promille. "
  : chosen.name + ", din alkoholhalt är okänd. ";
speak(offer + "Tryck 1 för att rulla en öl. Tryck 0 för att gå tillbaka.");
if (readKey() !== "1") { return; }

var roll = http.post(base + "/api/public/roll", { userId: chosen.id }).json;
var beerName = (roll && roll.productNameBold) ? roll.productNameBold : "en öl";
speak("Du rullade " + beerName + ", " + sv(roll.alcoholPercent) + " procent. Tryck 1 för att acceptera. Tryck 2 för att avvisa.");

var decision = readKey();
if (decision === "1") {
  http.post(base + "/api/public/roll/" + roll.id + "/accept", {});
  speak("Accepterad. Skål!");
} else if (decision === "2") {
  http.post(base + "/api/public/roll/" + roll.id + "/veto", {});
  speak("Avvisad.");
}

function sv(f) { return String(f).replace(".", ","); }
''' } },
    { num = 5, srv = { dst = "traintimes", tmpl = """{{.K.InformationOwner}},
        {{index .K.ProductInformation 0}},
        {{.K.TypeOfTraffic}} nummer,
        {{.K.TechnicalTrainIdent}},
        Från {{.From.AdvertisedLocationName}},
        Till {{.To.AdvertisedLocationName}},
        avgår från spår: {{.K.TrackAtLocation}},
        klockan {{.Hour}} och {{.Minute}}""", args = { station = "Reftele" } } },
    { num = 8, dst = "voicemail" },
    { num = 9, dispatcher = "customerservice" },
    { num = 3, dst = "voicemail" },
    { num = 2, name = "Sauna", genericjson = { url = "https://bastu-bot.wberg.com/temperatures", tmpl = "The temperature in the sauna is {{round (jq .Data \".[] | select(.name == \\\"Summalajnen\\\") | .temperature\")}} celsius." } }
]

[[fn]]
name = "voicemail"
recording = { path = "voicemail" }
prefix = { tts = { msg = "Please leave a message after the beep: BEEP" } }

[[fn]]
name = "directory"
prefix = { tts = { msg = """Directory. Press one for sales, two for support,
    three for billing. Press zero to go back.""" } }
actions = [
    { num = 1, transfer = "201" },
    { num = 2, transfer = "202" },
    { num = 3, transfer = "203" }
]

[[queue]]
name = "customerservice"
entrymsg = { tts = { msg = """Please wait while we try to connect you to one
    of our customer service representatives""" }, wait = true }
minpos = 20
maxpos = 45
speed = 60
minprompt = 35
maxprompt = 120
currentpos = { msg = "Your current place in line is: {{.Position}}" }
bgmusic = { src = "files/hold.mp3" }
end = { tts = { msg = "Technical error, please try again." } }
[[queue.prompt]]
prompt = { tts = { msg = """"We are currently experiencing high call volumes.
    Your call will be answered as soon as possible by one of our agents.""" } }
weight = 4
[[queue.prompt]]
prompt = { tts = { msg = """"Your call is very important to us,
    please stay on the line.""" } }
weight = 3
[[queue.prompt]]
prompt = { tts = { msg = """"You may find answers to your questions by visiting
        w w w dot anderstorpsfestivalen dot s e""" } }
weight = 1
[[queue.prompt]]
prompt = { tts = { msg = """"Your call is very important to us, please stay on the line
        until your call is no longer important to you.""" } }
weight = 1
[[queue.prompt]]
empty = true
weight = 3
